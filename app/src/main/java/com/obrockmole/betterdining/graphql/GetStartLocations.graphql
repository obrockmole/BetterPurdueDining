query getStartLocations($date: Date!) {
    diningCourtCategories {
        name
        diningCourts {
            category
            name
            formalName
            id
            lineLength
            dailyMenu(date: $date) {
                notes
                meals {
                    name
                    id
                    status
                    type
                    startTime
                    endTime
                    notes
                }
            }
        }
    }
}