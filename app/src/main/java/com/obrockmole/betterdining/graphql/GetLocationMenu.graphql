query GetLocationMenu($id: ID!, $date: Date!) {
    diningCourt(id: $id) {
        name
        formalName
        id
        lineLength
        dailyMenu(date: $date) {
            notes
            meals {
                name
                notes
                status
                startTime
                endTime
                stations {
                    name
                    id
                    items {
                        specialName
                        itemMenuId
                        hasComponents
                        item {
                            name
                            itemId
                            traits {
                                name
                            }
                            components {
                                name
                                itemId
                                traits {
                                    name
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}